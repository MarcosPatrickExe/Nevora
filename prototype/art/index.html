<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Névora — Galeria de Concepts</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#141013; color:#e8dcc8; font-family:Georgia, serif; padding:24px; }
  h1 { color:#f5c96b; letter-spacing:.2em; text-align:center; margin:18px 0 4px; }
  p.sub { text-align:center; color:#a89880; font-style:italic; margin-bottom:28px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(340px,1fr)); gap:22px; max-width:1500px; margin:0 auto; }
  figure { background:#1e181c; border:1px solid #3a2b1c; border-radius:12px; overflow:hidden; }
  figure img { width:100%; display:block; }
  figcaption { padding:12px 16px; font-size:15px; color:#c9b896; }
  figcaption b { color:#f0e2c8; }
  a.back { display:block; text-align:center; color:#f5c96b; margin:30px 0 10px; font-size:18px; }
</style>
</head>
<body>
  <h1>NÉVORA</h1>
  <p class="sub">galeria de arte conceitual interna — estilo "desenhado à mão e digitalizado" (ADR-010)<br>
  placeholders do time; a arte final será redesenhada por artista</p>
  <div class="grid">
    <figure><img src="png/acendedores.png" alt="Os quatro Acendedores" loading="lazy">
      <figcaption><b>Os Quatro Acendedores</b> — Âmbar, Ciano, Magenta e Verde-lima (line-up)</figcaption></figure>
    <figure><img src="png/inimigos.png" alt="Bestiário do protótipo" loading="lazy">
      <figcaption><b>Bestiário Encinzado</b> — os 5 inimigos do protótipo, um por região</figcaption></figure>
    <figure><img src="png/cenario-vale-das-velas.png" alt="Vale das Velas" loading="lazy">
      <figcaption><b>Vale das Velas</b> — o farol de cera e a trilha das velas</figcaption></figure>
    <figure><img src="png/cenario-galerias-fungicas.png" alt="Galerias Fúngicas" loading="lazy">
      <figcaption><b>Galerias Fúngicas</b> — a luz do Acendedor contra a escuridão</figcaption></figure>
    <figure><img src="png/menu-fundo.png" alt="Fundo de menu" loading="lazy">
      <figcaption><b>Fundo do menu principal</b> — os quatro subindo a trilha (espaço p/ título no topo)</figcaption></figure>
    <figure><img src="png/bolhinha.png" alt="Bolhinha" loading="lazy">
      <figcaption><b>Bolhinha</b> — o vaga-lume mascote / ping cooperativo</figcaption></figure>
  </div>
  <a class="back" href="../">← jogar o protótipo</a>
</body>
</html>
