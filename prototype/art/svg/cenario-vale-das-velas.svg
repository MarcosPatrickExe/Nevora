<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2436"/><stop offset="55%" stop-color="#7c4030"/><stop offset="100%" stop-color="#b06a35"/>
    </linearGradient>
    <filter id="ink" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="turbulence" baseFrequency="0.012" numOctaves="3" seed="17" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="9"/>
    </filter>
    <filter id="wash">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.03" numOctaves="3" seed="5" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="26"/>
    </filter>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" seed="3" result="n"/>
      <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.5 0 0 0 0 0.42 0 0 0 0 0.34 0 0 0 0.06 0"/>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe9b0" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#ffb13b" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffb13b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="flame" cx="50%" cy="72%" r="60%">
      <stop offset="0%" stop-color="#fff7d6"/><stop offset="55%" stop-color="#ffb13b"/><stop offset="100%" stop-color="#d2691e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c8a0" stop-opacity="0"/><stop offset="100%" stop-color="#e8c8a0" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- névoa horizontal distante -->
  <g filter="url(#wash)">
    <ellipse cx="500" cy="620" rx="700" ry="60" fill="#d8a06a" opacity="0.35"/>
    <ellipse cx="1400" cy="560" rx="800" ry="70" fill="#c88a58" opacity="0.3"/>
  </g>

  <!-- colinas de cera distantes -->
  <g filter="url(#wash)">
    <path d="M-50,760 C220,640 420,700 640,660 C900,610 1100,700 1320,650 C1560,600 1760,690 1970,640 L1970,1090 L-50,1090 Z" fill="#5a3040" opacity="0.85"/>
    <path d="M-50,860 C260,760 520,820 820,780 C1120,740 1420,820 1970,760 L1970,1090 L-50,1090 Z" fill="#43222f"/>
  </g>

  <!-- velas gigantes apagadas (fundo) -->
  <g filter="url(#ink)" opacity="0.9">
    <g transform="translate(260,580)">
      <path d="M-60,330 C-70,140 -50,10 0,0 C50,10 66,150 58,330 Z" fill="#2f1a24" stroke="#1a0e14" stroke-width="8"/>
      <path d="M-40,40 C-52,90 -46,150 -38,180" stroke="#1a0e14" stroke-width="6" fill="none"/>
      <path d="M0,0 L2,-34" stroke="#1a0e14" stroke-width="7" stroke-linecap="round"/>
    </g>
    <g transform="translate(1650,560)">
      <path d="M-64,360 C-76,150 -54,12 0,0 C54,12 72,160 62,360 Z" fill="#33202a" stroke="#1a0e14" stroke-width="8"/>
      <path d="M44,60 C56,120 50,190 42,230" stroke="#1a0e14" stroke-width="6" fill="none"/>
      <path d="M0,0 L-4,-38" stroke="#1a0e14" stroke-width="7" stroke-linecap="round"/>
    </g>
  </g>

  <!-- O FAROL DE CERA (torre central aceso) -->
  <g transform="translate(1130,240)">
    <ellipse cx="0" cy="-10" rx="330" ry="300" fill="url(#glow)" opacity="0.9"/>
    <g filter="url(#ink)">
      <path d="M-90,620 C-110,320 -80,60 0,30 C80,60 104,330 88,620 Z" fill="#8a5a38" stroke="#241209" stroke-width="9"/>
      <!-- escorridos de cera -->
      <path d="M-66,120 C-84,220 -74,330 -62,400 C-58,430 -70,440 -74,414" fill="none" stroke="#241209" stroke-width="7"/>
      <path d="M62,180 C76,280 70,380 60,440" fill="none" stroke="#241209" stroke-width="6"/>
      <path d="M-20,80 C-28,140 -24,200 -18,240" fill="none" stroke="#5f3a20" stroke-width="8"/>
      <!-- janelas de brasa -->
      <path d="M-26,330 C-26,306 -6,300 -4,326 C-4,342 -12,350 -16,350 C-22,348 -26,340 -26,330 Z" fill="#ffb13b" stroke="#241209" stroke-width="5"/>
      <path d="M18,470 C18,450 34,446 36,466 C36,480 28,486 26,486 C20,484 18,478 18,470 Z" fill="#ff9d3b" stroke="#241209" stroke-width="5"/>
      <!-- coroa do farol -->
      <path d="M-44,44 C-30,10 30,10 46,44" fill="none" stroke="#241209" stroke-width="8"/>
      <path d="M0,30 L0,-10" stroke="#241209" stroke-width="8" stroke-linecap="round"/>
    </g>
    <path d="M-26,-36 C-32,-110 -4,-160 6,-172 C30,-136 38,-84 14,-28 C4,-12 -16,-14 -26,-36 Z" fill="url(#flame)"/>
  </g>

  <!-- chão / trilha -->
  <g filter="url(#ink)">
    <path d="M-40,900 C300,850 700,880 1000,860 C1300,840 1660,870 1960,850 L1960,1090 L-40,1090 Z" fill="#4a2a1c" stroke="#241209" stroke-width="9"/>
    <path d="M240,980 C560,940 900,960 1180,930 C1400,910 1600,920 1780,900" fill="none" stroke="#6b4226" stroke-width="26" opacity="0.7"/>
  </g>

  <!-- velas do caminho -->
  <g filter="url(#ink)">
    <g transform="translate(430,830)">
      <path d="M-26,70 C-30,20 -22,-24 0,-30 C22,-24 28,24 24,70 Z" fill="#e8d4b0" stroke="#241209" stroke-width="6"/>
      <path d="M0,-30 L0,-46" stroke="#241209" stroke-width="5" stroke-linecap="round"/>
      <path d="M-8,-52 C-10,-70 0,-82 3,-86 C11,-74 13,-62 4,-50 C0,-46 -5,-46 -8,-52 Z" fill="url(#flame)"/>
    </g>
    <g transform="translate(760,860)">
      <path d="M-20,54 C-24,14 -16,-18 0,-24 C16,-18 22,18 18,54 Z" fill="#decca8" stroke="#241209" stroke-width="5"/>
      <path d="M0,-24 L1,-38" stroke="#241209" stroke-width="4" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Acendedor pequenino caminhando para o farol -->
  <g transform="translate(905,868)" filter="url(#ink)">
    <ellipse cx="0" cy="34" rx="26" ry="6" fill="#1a0e08" opacity="0.4"/>
    <path d="M0,-26 C12,-24 14,-6 12,8 C11,22 12,28 7,32 C3,34 -5,34 -8,32 C-13,28 -12,20 -12,8 C-14,-8 -11,-24 0,-26 Z"
          fill="#efe3cb" stroke="#241209" stroke-width="4"/>
    <path d="M-10,10 C-4,13 5,13 11,10" stroke="#a97b32" stroke-width="3" fill="none"/>
    <circle cx="0" cy="-12" r="1.6" fill="#ff9d3b"/><circle cx="5" cy="-12" r="1.6" fill="#ff9d3b"/>
    <path d="M0,-26 L1,-32" stroke="#241209" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M-2,-34 C-3,-42 1,-47 2,-49 C6,-43 7,-38 3,-33 C1,-31 -1,-31 -2,-34 Z" fill="url(#flame)"/>
  </g>

  <!-- névoa de primeiro plano + vinheta -->
  <rect x="0" y="900" width="1920" height="180" fill="url(#mist)"/>
  <rect width="1920" height="1080" fill="url(#glow)" opacity="0.06"/>
  <rect width="1920" height="1080" fill="none" filter="url(#paper)"/>
  <text x="1890" y="1054" text-anchor="end" font-family="serif" font-size="22" fill="#f0dcc0" opacity="0.65" font-style="italic">Névora · Vale das Velas — concept interno (ADR-010)</text>
</svg>
